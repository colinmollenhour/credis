name: CI
on: [push, pull_request]
jobs:
  all:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: '7.4'
            phpunit: '^7.5'
          - php-version: '8.0'
            phpunit: '^9'
          - php-version: '8.1'
            phpunit: '^9'
          - php-version: '8.2'
            phpunit: '^9'
          - php-version: '8.3'
            phpunit: '^9'
          - php-version: '8.4'
            phpunit: '^9'
    name: PHP ${{ matrix.php-version }}
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: redis

    - name: Setup Redis
      run: sudo add-apt-repository ppa:redislabs/redis -y -u ; sudo apt install redis -y ; sudo systemctl stop redis\* ; redis-cli --version

    - name: Install dependencies
      env:
        PHPUNIT_VERSION: ${{ matrix.phpunit }}
      run: |
        if [ ! -z "$PHPUNIT_VERSION" ]; then
          composer require "phpunit/phpunit:${PHPUNIT_VERSION}" --dev --no-update -n
          need_install_dev=1
        fi
        if [ ! -z "$need_install_dev" ]; then
          composer install --dev -n
        fi

    - name: Report phpredis version
      run: php -r 'echo phpversion("redis")."\n";'

    - name: Unit tests
      run: ./vendor/bin/phpunit

  cs-fixer:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: '7.4'
            cs-fixer: '~3.13.0'
    name: php-cs-fixer ${{ matrix.cs-fixer }} - PHP ${{ matrix.php-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Install dependencies
        env:
          CS_FIXER_VERSION: ${{ matrix.cs-fixer }}
        run: |
          composer require "friendsofphp/php-cs-fixer:${CS_FIXER_VERSION}" --dev --no-update -n
          composer install --dev -n

      - name: Run PHP CS Fixer
        env:
          PHP_CS_FIXER_IGNORE_ENV: 1
        run: |
          ./vendor/bin/php-cs-fixer fix --diff --dry-run